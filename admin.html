<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Panel - CyberPanel</title><link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"

</head><body><div class="background"></div><div class="admin-page"><section class="panel"><!-- LOGIN ADMIN --><div id="loginBox"><h2>🔐 Admin Login</h2><label>Username</label>
<!DOCTYPE html><html lang="id">
<head><meta charset="UTF-8">

<input
type="text"
id="adminUser"

<label>Password</label>

<input
type="password"
id="adminPass"
placeholder="Masukkan Password">

<button onclick="adminLogin()">
Login Admin
</button><button

onclick="window.location.href='index.html'">

</button></div><!-- PANEL ADMIN --><div

</div>

</div><div class="stat-card">
